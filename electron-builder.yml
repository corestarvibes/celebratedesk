appId: com.celebratedesk.app
productName: CelebrateDesk
directories:
  output: dist-electron
  buildResources: build
files:
  - out/**/*
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json,tailwind.config.js,postcss.config.js}'
asarUnpack:
  - resources/**
  - node_modules/better-sqlite3/**
  - node_modules/puppeteer-core/**
  - node_modules/sharp/**
  - node_modules/@img/**
win:
  target: nsis
  executableName: CelebrateDesk
  icon: build/icon.ico
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  target: dmg
  icon: build/icon.icns
  # macOS 26 (Sequoia+) enforces stricter Team-ID consistency across an
  # app bundle's signed binaries. With hardenedRuntime + no real Apple
  # Developer cert, electron-builder's ad-hoc signing produces mismatched
  # Team IDs between the outer .app and the embedded Electron Framework,
  # causing dyld to refuse loading the framework at launch:
  #   "mapping process and mapped file have different Team IDs"
  # Disabling hardenedRuntime + identity: null produces a uniform ad-hoc
  # signature across the bundle. Trade-off: app can't be notarized, but
  # we don't notarize anyway (no $99/yr cert).
  hardenedRuntime: false
  identity: null
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false
dmg:
  # Per-arch suffix is required because we publish both arm64 and x64
  # DMGs to the same GitHub release. Without ${arch}, the two builds
  # would collide on filename. Apple Silicon -> "-arm64.dmg",
  # Intel -> "-x64.dmg" (the historical default suffixes electron-builder
  # uses when this template explicitly asks for arch).
  artifactName: ${name}-${version}-${arch}.${ext}
linux:
  target: AppImage
  icon: build/icon.png
  maintainer: celebratedesk.app
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: corestarvibes
  repo: celebratedesk
