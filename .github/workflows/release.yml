# Build + publish a multi-platform release.
#
# Triggered by pushing a git tag like `v1.0.1`. Two parallel jobs:
#   build-windows -> celebratedesk-<version>-setup.exe + latest.yml
#   build-mac     -> celebratedesk-<version>.dmg     + latest-mac.yml
# Both attach to the same GitHub Release; the OS-specific manifest tells
# each running app which file to download.
#
# Auto-update story:
#   - Windows mini PCs: silent differential updates via electron-updater
#     (no signing needed because Squirrel handles the install).
#   - Mac (your dev machine): the update check + download still happens,
#     but installing an unsigned update is blocked by Gatekeeper. So on
#     Mac you'll get a "new version available" toast, and you can grab
#     the DMG from the Releases page when you actually want to update.
#     Buying a $99/yr Apple Developer cert would enable seamless Mac
#     auto-updates if it ever matters; for now it's manual on Mac.
#
# Neither platform is code-signed (cert costs aren't worth it for a gym
# kiosk). One-time Gatekeeper / SmartScreen prompt on first install,
# then the auto-update channel handles everything else on Windows.

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
        env:
          HUSKY: '0'
      - run: npm run build
      - run: npm test
      - name: Build + publish Windows installer
        run: npm run build:win -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
        env:
          HUSKY: '0'
      - run: npm run build
      - run: npm test
      # macos-latest runners are Apple Silicon (arm64). We build arm64-only
      # by default — sharp's per-arch native binaries break universal
      # builds (the same .node file ends up in both x64 and arm64 trees,
      # which @electron/universal refuses to merge). If an Intel Mac ever
      # needs this, add a separate runner block with `runs-on: macos-13`
      # (last Intel-default runner) and target x64.
      - name: Build + publish Mac DMG
        run: npm run build:mac -- --arm64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  promote-release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Promote draft release to public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --draft=false
